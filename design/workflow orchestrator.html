<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dave — orchestrator</title>
  <!-- Window chrome / title-bar color: matches --bg-0 so the OS toolbar (traffic
       lights) follows the app's dark surface instead of defaulting to white. -->
  <meta name="theme-color" content="#0d0e12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Font Awesome 6 Free (SVG framework). Auto-replace + mutation observer are
       turned OFF; icons.jsx pulls each glyph as inline SVG via FontAwesome.icon(),
       so React owns the DOM and the SVGs survive screenshots / PDF / offline export. -->
  <script>window.FontAwesomeConfig = { autoReplaceSvg: false, observeMutations: false };</script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="views-workflows.jsx"></script>
  <script type="text/babel" src="views-tasks.jsx"></script>
  <script type="text/babel" src="views-runs.jsx"></script>
  <script type="text/babel" src="views-triggers.jsx"></script>
  <script type="text/babel" src="views-settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script src="overlay-scroll.js"></script>
</body>
</html>
