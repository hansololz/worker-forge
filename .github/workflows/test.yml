name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: engine
        run: pip install -r requirements-test.txt
      - name: Run tests
        working-directory: engine
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: frontend unit (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  e2e:
    name: e2e (electron + xvfb, docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build e2e image and run
        run: docker compose -f docker/docker-compose.test.yml run --rm e2e
